<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>C++ WebAssembly Expense Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      margin-bottom: 8px;
    }

    .subtitle {
      color: #555;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    input, button, select {
      padding: 10px;
      margin: 6px 4px 6px 0;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
    }

    button.secondary {
      background: #555;
    }

    button.danger {
      background: #b00020;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #eee;
    }

    .summary {
      font-size: 20px;
      font-weight: bold;
    }

    .message {
      margin-top: 10px;
      color: #0a6;
    }

    .error {
      color: #b00020;
    }
  </style>
</head>

<body>
  <h1>C++ Expense Tracker running in WebAssembly</h1>
  <p class="subtitle">
    The app logic is written in C++, compiled to WebAssembly with Emscripten, and hosted on GitHub Pages.
  </p>

  <div class="card">
    <h2>Add Expense</h2>
    <input id="description" placeholder="Description" />
    <input id="amount" type="number" step="0.01" placeholder="Amount" />
    <input id="category" placeholder="Category" value="General" />
    <button onclick="addExpense()">Add</button>
    <p id="message" class="message"></p>
  </div>

  <div class="card">
    <h2>Summary</h2>
    <p class="summary">Total: $<span id="total">0.00</span></p>

    <select id="month">
      <option value="1">January</option>
      <option value="2">February</option>
      <option value="3">March</option>
      <option value="4">April</option>
      <option value="5">May</option>
      <option value="6">June</option>
      <option value="7">July</option>
      <option value="8">August</option>
      <option value="9">September</option>
      <option value="10">October</option>
      <option value="11">November</option>
      <option value="12">December</option>
    </select>

    <button class="secondary" onclick="showMonthlySummary()">Monthly Summary</button>
    <p id="monthlyTotal"></p>
  </div>

  <div class="card">
    <h2>Expenses</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>Description</th>
          <th>Amount</th>
          <th>Category</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="expenseTable"></tbody>
    </table>

    <br />
    <button class="secondary" onclick="downloadCsv()">Download CSV</button>
  </div>

  <script src="expense_tracker.js"></script>

  <script>
    let tracker = null;

    Module.onRuntimeInitialized = () => {
      tracker = new Module.ExpenseTracker();
      render();
    };

    function setMessage(text, isError = false) {
      const message = document.getElementById("message");
      message.textContent = text;
      message.className = isError ? "message error" : "message";
    }

    function addExpense() {
      try {
        const description = document.getElementById("description").value.trim();
        const amount = Number(document.getElementById("amount").value);
        const category = document.getElementById("category").value.trim();

        const id = tracker.addExpense(description, amount, category);

        document.getElementById("description").value = "";
        document.getElementById("amount").value = "";
        document.getElementById("category").value = "General";

        setMessage(`Expense added successfully. ID: ${id}`);
        render();
      } catch (error) {
        setMessage(error.message, true);
      }
    }

    function deleteExpense(id) {
      const deleted = tracker.deleteExpense(id);

      if (deleted) {
        setMessage("Expense deleted successfully.");
      } else {
        setMessage("Expense not found.", true);
      }

      render();
    }

    function render() {
      const table = document.getElementById("expenseTable");
      table.innerHTML = "";

      const expenses = tracker.listExpenses();

      for (let i = 0; i < expenses.size(); i++) {
        const expense = expenses.get(i);

        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${expense.id}</td>
          <td>${expense.date}</td>
          <td>${expense.description}</td>
          <td>$${expense.amount.toFixed(2)}</td>
          <td>${expense.category}</td>
          <td>
            <button class="danger" onclick="deleteExpense(${expense.id})">Delete</button>
          </td>
        `;

        table.appendChild(row);
      }

      document.getElementById("total").textContent =
        tracker.getTotalSummary().toFixed(2);
    }

    function showMonthlySummary() {
      try {
        const month = Number(document.getElementById("month").value);
        const total = tracker.getMonthlySummary(month);

        document.getElementById("monthlyTotal").textContent =
          `Monthly total: $${total.toFixed(2)}`;
      } catch (error) {
        document.getElementById("monthlyTotal").textContent = error.message;
      }
    }

    function downloadCsv() {
      const csv = tracker.exportCsv();
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "expenses.csv";
      link.click();

      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
